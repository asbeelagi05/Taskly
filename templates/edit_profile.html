{% extends "base.html" %}

{% block content %}

<div class="row justify-content-center">

<div class="col-lg-6">

<div class="card shadow-sm border-0 rounded-4">

<div class="card-body p-5">

<h2 class="fw-bold mb-4">

Edit Profile

</h2>

<form method="POST">

<div class="mb-3">

<label>Name</label>

<input
type="text"
name="name"
class="form-control"
value="{{ current_user.name }}"
required>

</div>

<div class="mb-3">

<label>Email</label>

<input
type="email"
name="email"
class="form-control"
value="{{ current_user.email }}"
required>

</div>

<div class="mb-3">

<label>Phone</label>

<input
type="text"
name="phone"
class="form-control"
value="{{ current_user.phone }}"
required>

</div>

<button
class="btn btn-primary">

Save Changes

</button>

<a
href="/profile"
class="btn btn-secondary">

Cancel

</a>

</form>

</div>

</div>

</div>

</div>

{% endblock %}
