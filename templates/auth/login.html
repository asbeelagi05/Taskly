{% extends "base.html" %}

{% block content %}

<div class="row justify-content-center">

    <div class="col-md-5">

        <div class="card shadow-sm border-0 rounded-4">

            <div class="card-body p-5">

                <div class="text-center mb-4">

                    <i class="bi bi-person-circle display-3 text-primary"></i>

                    <h2 class="fw-bold mt-3">

                        Welcome Back

                    </h2>

                    <p class="text-muted">

                        Login to your Taskly account

                    </p>

                </div>

                <form method="POST">

                    <div class="mb-3">

                        <label class="form-label">

                            Email

                        </label>

                        <input
                            type="email"
                            name="email"
                            class="form-control"
                            required>

                    </div>

                    <div class="mb-4">

                        <label class="form-label">

                            Password

                        </label>

                        <input
                            type="password"
                            name="password"
                            class="form-control"
                            required>

                    </div>

                    <button
                        type="submit"
                        class="btn btn-primary w-100">

                        Login

                    </button>

                </form>

                <hr>

                <div class="text-center">

                    Don't have an account?

                    <a href="/register">

                        Register

                    </a>

                </div>

            </div>

        </div>

    </div>

</div>

{% endblock %}
