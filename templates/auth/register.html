{% extends "base.html" %}

{% block content %}

<div class="row justify-content-center">

    <div class="col-lg-6">

        <div class="card shadow-sm border-0 rounded-4">

            <div class="card-body p-5">

                <div class="text-center mb-4">

                    <i class="bi bi-person-plus-fill display-3 text-primary"></i>

                    <h2 class="fw-bold mt-3">

                        Create Account

                    </h2>

                    <p class="text-muted">

                        Join Taskly today

                    </p>

                </div>

                <form method="POST" id="registerForm">

                    <div class="mb-3">

                        <label class="form-label">

                            Full Name

                        </label>

                        <input
                            type="text"
                            class="form-control"
                            name="name"
                            required>

                    </div>

                    <div class="mb-3">

                        <label class="form-label">

                            Email

                        </label>

                        <input
                            type="email"
                            class="form-control"
                            id="email"
                            name="email"
                            required>

                        <div class="form-text" id="emailFeedback"></div>

                    </div>

                    <div class="mb-3">

                        <label class="form-label">

                            Phone

                        </label>

                        <input
                            type="text"
                            class="form-control"
                            name="phone"
                            required>

                    </div>

                    <div class="mb-3">

                        <label class="form-label">

                            Password

                        </label>

                        <input
                            type="password"
                            class="form-control"
                            name="password"
                            required>

                    </div>

                    <div class="mb-4">

                        <label class="form-label">

                            Register As

                        </label>

                        <select
                            class="form-select"
                            name="role">

                            <option value="customer">

                                Customer

                            </option>

                            <option value="labour">

                                Labour

                            </option>

                        </select>

                    </div>

                    <button
                        type="submit"
                        class="btn btn-primary w-100"
                        id="registerButton">

                        Create Account

                    </button>

                </form>

                <hr>

                <div class="text-center">

                    Already have an account?

                    <a href="/login">

                        Login

                    </a>

                </div>

            </div>

        </div>

    </div>

</div>

<script>
(() => {
    const emailInput = document.getElementById("email");
    const feedback = document.getElementById("emailFeedback");
    const registerButton = document.getElementById("registerButton");
    const registerForm = document.getElementById("registerForm");
    let checkTimer = null;
    let submitBypass = false;

    const setState = (message, isInvalid) => {
        feedback.textContent = message;
        feedback.className = isInvalid ? "form-text text-danger" : "form-text text-success";
        registerButton.disabled = isInvalid;
    };

    const clearState = () => {
        feedback.textContent = "";
        feedback.className = "form-text";
        registerButton.disabled = false;
    };

    const checkEmail = async () => {
        const email = emailInput.value.trim();

        if (!email) {
            clearState();
            return null;
        }

        try {
            const response = await fetch(`/check-email?email=${encodeURIComponent(email)}`);
            const data = await response.json();

            if (data.exists) {
                setState("Email already exists.", true);
                return true;
            } else {
                setState("Email is available.", false);
                return false;
            }
        } catch (error) {
            clearState();
            return null;
        }
    };

    emailInput.addEventListener("input", () => {
        registerButton.disabled = false;
        if (checkTimer) {
            clearTimeout(checkTimer);
        }

        checkTimer = setTimeout(checkEmail, 300);
    });

    emailInput.addEventListener("blur", checkEmail);

    registerForm.addEventListener("submit", async (event) => {
        if (submitBypass) {
            submitBypass = false;
            return;
        }

        event.preventDefault();

        const exists = await checkEmail();

        if (exists) {
            return;
        }

        submitBypass = true;
        registerForm.requestSubmit();
    });
})();
</script>

{% endblock %}
