{% extends "base.html" %}

{% block content %}

<div class="row justify-content-center">

    <div class="col-lg-6">

        <div class="card shadow-sm border-0 rounded-4">

            <div class="card-body p-5">

                <div class="text-center mb-4">

                    <i class="bi bi-person-plus-fill display-3 text-primary"></i>

                    <h2 class="fw-bold mt-3">

                        Create Account

                    </h2>

                    <p class="text-muted">

                        Join Taskly today

                    </p>

                </div>

                <form method="POST">

                    <div class="mb-3">

                        <label class="form-label">

                            Full Name

                        </label>

                        <input
                            type="text"
                            class="form-control"
                            name="name"
                            required>

                    </div>

                    <div class="mb-3">

                        <label class="form-label">

                            Email

                        </label>

                        <input
                            type="email"
                            class="form-control"
                            name="email"
                            required>

                    </div>

                    <div class="mb-3">

                        <label class="form-label">

                            Phone

                        </label>

                        <input
                            type="text"
                            class="form-control"
                            name="phone"
                            required>

                    </div>

                    <div class="mb-3">

                        <label class="form-label">

                            Password

                        </label>

                        <input
                            type="password"
                            class="form-control"
                            name="password"
                            required>

                    </div>

                    <div class="mb-4">

                        <label class="form-label">

                            Register As

                        </label>

                        <select
                            class="form-select"
                            name="role">

                            <option value="customer">

                                Customer

                            </option>

                            <option value="labour">

                                Labour

                            </option>

                        </select>

                    </div>

                    <button
                        type="submit"
                        class="btn btn-primary w-100">

                        Create Account

                    </button>

                </form>

                <hr>

                <div class="text-center">

                    Already have an account?

                    <a href="/login">

                        Login

                    </a>

                </div>

            </div>

        </div>

    </div>

</div>

{% endblock %}
