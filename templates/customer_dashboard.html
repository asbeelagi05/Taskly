body{
    font-family: 'Segoe UI', sans-serif;
}

.card{
    border:none;
    border-radius:15px;
}

.btn{
    border-radius:10px;
}

input,
textarea,
select{
    border-radius:10px !important;
}

.navbar-brand{
    font-size:1.4rem;
    font-weight:700;
}

.shadow-card{
    box-shadow:0 10px 25px rgba(0,0,0,.08);
}
