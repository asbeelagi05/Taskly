{% extends "base.html" %}

{% block content %}

<div class="row justify-content-center">

    <div class="col-lg-8">

        <div class="card shadow-sm border-0 rounded-4">

            <div class="card-body p-5">

                <div class="text-center mb-5">

                    <i class="bi bi-pencil-square display-3 text-warning"></i>

                    <h2 class="fw-bold mt-3">

                        Edit Job

                    </h2>

                    <p class="text-muted">

                        Update your job details.

                    </p>

                </div>

                <form method="POST">

                    <div class="mb-4">

                        <label class="form-label fw-semibold">
                            Job Title
                        </label>

                        <input
                            type="text"
                            class="form-control"
                            name="title"
                            value="{{ job.title }}"
                            required>

                    </div>

                    <div class="mb-4">

                        <label class="form-label fw-semibold">
                            Description
                        </label>

                        <textarea
                            class="form-control"
                            rows="5"
                            name="description"
                            required>{{ job.description }}</textarea>

                    </div>

                    <div class="row">

                        <div class="col-md-6 mb-4">

                            <label class="form-label fw-semibold">
                                Location
                            </label>

                            <input
                                type="text"
                                class="form-control"
                                name="location"
                                value="{{ job.location }}"
                                required>

                        </div>

                        <div class="col-md-6 mb-4">

                            <label class="form-label fw-semibold">
                                Budget (₹)
                            </label>

                            <input
                                type="number"
                                class="form-control"
                                name="budget"
                                value="{{ job.budget }}"
                                required>

                        </div>

                    </div>

                    <div class="mb-4">

                        <label class="form-label fw-semibold">
                            Workers Required
                        </label>

                        <input
                            type="number"
                            class="form-control"
                            name="workers_required"
                            value="{{ job.workers_required }}"
                            min="1"
                            required>

                    </div>

                    <div class="d-grid gap-2">

                        <button
                            type="submit"
                            class="btn btn-warning btn-lg">

                            <i class="bi bi-check-circle-fill"></i>

                            Update Job

                        </button>

                        <a
                            href="/view-job/{{ job.id }}"
                            class="btn btn-outline-secondary">

                            Cancel

                        </a>

                    </div>

                </form>

            </div>

        </div>

    </div>

</div>

{% endblock %}
