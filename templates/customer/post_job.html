{% extends "base.html" %}

{% block content %}

<div class="row justify-content-center">

    <div class="col-lg-8">

        <div class="card shadow-sm border-0 rounded-4">

            <div class="card-body p-5">

                <div class="text-center mb-5">

                    <i class="bi bi-tools display-3 text-primary"></i>

                    <h2 class="fw-bold mt-3">

                        Post a New Job

                    </h2>

                    <p class="text-muted">

                        Tell us about your labour requirement.

                    </p>

                </div>

                <form method="POST">

                    <div class="mb-4">

                        <label class="form-label fw-semibold">

                            Job Title

                        </label>

                        <input
                            type="text"
                            class="form-control"
                            name="title"
                            placeholder="House Painting"
                            required>

                    </div>

                    <div class="mb-4">

                        <label class="form-label fw-semibold">

                            Description

                        </label>

                        <textarea
                            class="form-control"
                            rows="5"
                            name="description"
                            placeholder="Describe the work..."
                            required></textarea>

                    </div>

                    <div class="row">

                        <div class="col-md-6 mb-4">

                            <label class="form-label fw-semibold">

                                Location

                            </label>

                            <input
                                type="text"
                                class="form-control"
                                name="location"
                                placeholder="Mysuru"
                                required>

                        </div>

                        <div class="col-md-6 mb-4">

                            <label class="form-label fw-semibold">

                                Budget (₹)

                            </label>

                            <input
                                type="number"
                                class="form-control"
                                name="budget"
                                placeholder="5000"
                                required>

                        </div>

                    </div>

                    <div class="mb-4">

                        <label class="form-label fw-semibold">

                            Workers Required

                        </label>

                        <input
                            type="number"
                            class="form-control"
                            name="workers_required"
                            placeholder="3"
                            min="1"
                            required>

                    </div>

                    <div class="d-grid gap-2">

                        <button
                            class="btn btn-primary btn-lg"
                            type="submit">

                            <i class="bi bi-plus-circle-fill"></i>

                            Post Job

                        </button>

                        <a
                            href="/customer/dashboard"
                            class="btn btn-outline-secondary">

                            Cancel

                        </a>

                    </div>

                </form>

            </div>

        </div>

    </div>

</div>

{% endblock %}
